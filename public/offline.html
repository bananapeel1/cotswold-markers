<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — TrailTap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fcf9f4;
      color: #173124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: #173124;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg {
      width: 24px;
      height: 24px;
    }
    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: #173124;
      letter-spacing: -0.02em;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      background: #173124;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      opacity: 0.9;
    }
    .offline-icon svg {
      width: 40px;
      height: 40px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 1rem;
      color: #3d5a4c;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 2rem;
    }
    .reassurance {
      background: #e8f0eb;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      max-width: 340px;
      margin: 0 auto 2rem;
    }
    .reassurance-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-align: left;
      font-size: 0.875rem;
      color: #173124;
      line-height: 1.5;
    }
    .reassurance-item + .reassurance-item {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(23, 49, 36, 0.1);
    }
    .reassurance-icon {
      width: 32px;
      height: 32px;
      background: #173124;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .reassurance-icon svg {
      width: 18px;
      height: 18px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #173124;
      color: #fcf9f4;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 14px;
      font-size: 0.9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .retry-btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: #3d5a4c;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fcf9f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>
    <span class="logo-text">TrailTap</span>
  </div>

  <div class="offline-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fcf9f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0122.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 016.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p class="subtitle">No worries — the trail will be here when you're back in range.</p>

  <div class="reassurance">
    <div class="reassurance-item">
      <div class="reassurance-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fcf9f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      </div>
      <span>Your trail data and scans are saved locally</span>
    </div>
    <div class="reassurance-item">
      <div class="reassurance-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fcf9f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
      </div>
      <span>Any scans you make will sync when you reconnect</span>
    </div>
  </div>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
    </svg>
    Try again
  </button>

  <p class="footer">Find some signal and give it another go</p>
</body>
</html>
